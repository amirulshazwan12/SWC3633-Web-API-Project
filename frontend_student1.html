<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise System Dashboard | Portal Alpha</title>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --warning: #f6c23e; --danger: #e74a3b; --dark: #5a5c69; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fc; margin: 0; padding: 20px; color: #333; }
        .wrapper { max-width: 1200px; margin: auto; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #eaecf4; color: var(--dark); padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #d1d3e2; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-load { background: var(--success); margin-bottom: 15px; }
        .btn-danger { background: var(--danger); padding: 5px 10px; width: auto; font-size: 12px; border-radius:3px;}
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #e3e6f0; font-size: 14px; }
        th { background: #f8f9fc; color: var(--dark); }
        .console { background: #222; color: #00ff00; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 13px; max-height: 180px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h2>📊 Central Core Management Dashboard (Student 1)</h2>
        <div style="width: 250px;">
            <label style="color:white">X-API-KEY Verification Header:</label>
            <input type="text" id="authKey" value="RahasiaSangatAman123!">
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchEntity('exams')">📅 Examinations</button>
        <button class="tab-btn" onclick="switchEntity('courses')">📚 Courses Matrix</button>
        <button class="tab-btn" onclick="switchEntity('results')">🏆 Performance Results</button>
        <button class="tab-btn" onclick="switchEntity('users')">👥 User Access Profiles</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3 id="formTitle">📝 Ingest System Context</h3>
            <hr style="border: 1px solid #eaecf4; margin-bottom:15px;">
            
            <form id="formExams" class="form-panel active">
                <input type="hidden" id="exam_id">
                <div class="form-group"><label>Course Code Reference:</label><input type="text" id="ex_code" placeholder="e.g. BIT1023"></div>
                <div class="form-group"><label>Target Scheduling Date:</label><input type="date" id="ex_date"></div>
                <div class="form-group"><label>Operational Start Timestamp:</label><input type="time" id="ex_time"></div>
                <div class="form-group"><label>Assigned Venue/Hall:</label><input type="text" id="ex_venue" placeholder="e.g. Block D Hall 1"></div>
                <button type="submit">Commit Record</button>
            </form>

            <form id="formCourses" class="form-panel">
                <div class="form-group"><label>Course Code Key:</label><input type="text" id="co_code" placeholder="e.g. BIT1023"></div>
                <div class="form-group"><label>Full Descriptive Nomenclature:</label><input type="text" id="co_name" placeholder="e.g. Systems Architecture"></div>
                <div class="form-group"><label>Academic Credit Weights:</label><input type="number" id="co_credits" placeholder="e.g. 3"></div>
                <button type="submit">Commit Course Structure</button>
            </form>

            <form id="formResults" class="form-panel">
                <input type="hidden" id="result_id">
                <div class="form-group"><label>Target Student Index String:</label><input type="text" id="res_stud" placeholder="e.g. SU10923"></div>
                <div class="form-group"><label>Associated Course ID:</label><input type="text" id="res_code" placeholder="e.g. BIT1023"></div>
                <div class="form-group"><label>Letter Classification Grade:</label><input type="text" id="res_grade" placeholder="e.g. A+"></div>
                <button type="submit">Log Assessment Score</button>
            </form>

            <form id="formUsers" class="form-panel">
                <input type="hidden" id="user_id">
                <div class="form-group"><label>Target Account Username:</label><input type="text" id="usr_name" placeholder="e.g. administrator"></div>
                <div class="form-group"><label>Secure Communication Email:</label><input type="email" id="usr_email" placeholder="e.g. root@server.local"></div>
                <div class="form-group" id="passWrapper"><label>Credential Access Password:</label><input type="password" id="usr_pass"></div>
                <div class="form-group"><label>System Governance Role Privilege:</label>
                    <select id="usr_role"><option value="Student">Student Access Token</option><option value="Lecturer">Lecturer Supervisor</option><option value="Admin">Global Infrastructure Admin</option></select>
                </div>
                <button type="submit">Instantiate Identity Instance</button>
            </form>
            
            <button id="abortEditBtn" style="background:#858796; margin-top:5px; display:none;">Abort Operational Edit</button>
        </div>

        <div class="card">
            <h3 style="text-transform: capitalize;" id="viewTitle">📅 Active Registries Table</h3>
            <button class="btn-load" id="syncStreamBtn">🔄 Dynamic REST-Stream Synchronization</button>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="console" id="logPanel">Infrastructure live. Awaiting asynchronous JSON loop handshakes...</div>
</div>
<script src="app_student1.js"></script>
</body>
</html>
